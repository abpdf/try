name: Build Flutter Rust App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CRATE_NAME: frb_template

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            flutter-args: build apk --split-per-abi
          - target: ios
            os: macos-latest
            flutter-args: build ios --release --no-codesign
          - target: windows
            os: windows-latest
            flutter-args: build windows --release
          - target: linux
            os: ubuntu-latest
            flutter-args: build linux --release
          - target: macos
            os: macos-latest
            flutter-args: build macos --release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Setup Android NDK
        if: matrix.target == 'android'
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}

      - name: Install iOS/macOS dependencies
        if: matrix.target == 'ios' || matrix.target == 'macos'
        run: |
          brew install llvm
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Flutter app
        run: flutter ${{ matrix.flutter-args }}

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.target }}" in
            android)
              zip -j dist/android.zip build/app/outputs/flutter-apk/*.apk
              ;;
            ios)
              zip -r dist/ios.zip build/ios/iphoneos/*.app
              ;;
            macos)
              zip -r dist/macos.zip build/macos/Build/Products/Release/*.app
              ;;
            linux)
              tar -czf dist/linux.tar.gz -C build/linux/x64/release/bundle .
              ;;
            windows)
              # 确定 Windows 构建产物目录
              release_dir="build/windows/x64/runner/Release"
              echo "=== Checking Windows build output ==="
              ls -R "$release_dir"
              # 使用 PowerShell 压缩该目录下的所有文件（不包含外层文件夹）
              powershell -Command "Set-Location '$release_dir'; Compress-Archive -Path * -DestinationPath '${GITHUB_WORKSPACE}/dist/windows.zip'"
              echo "=== windows.zip created in dist/ ==="
              ;;
          esac

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: dist/

  release:
    name: Create Release and Upload All Artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files (debug)
        run: ls -R artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/*/*.zip
            artifacts/*/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
